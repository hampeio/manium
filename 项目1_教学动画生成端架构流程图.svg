<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .title{font:700 38px 'Microsoft YaHei',sans-serif;fill:#182433}.sub{font:22px 'Microsoft YaHei',sans-serif;fill:#52606d}
      .h{font:700 24px 'Microsoft YaHei',sans-serif;fill:#17324d}.t{font:19px 'Microsoft YaHei',sans-serif;fill:#263746}
      .small{font:17px 'Microsoft YaHei',sans-serif;fill:#52606d}.box{fill:#f5f8fa;stroke:#66839b;stroke-width:2.4}
      .core{fill:#e8f1f6;stroke:#32678e;stroke-width:2.6}.data{fill:#f4f1e9;stroke:#8c7a4e;stroke-width:2.2}
      .guard{fill:#edf4f0;stroke:#4f7b67;stroke-width:2.2}.arrow{stroke:#c58a22;stroke-width:4;fill:none;marker-end:url(#a)}
      .dash{stroke:#82919d;stroke-width:3;stroke-dasharray:9 8;fill:none;marker-end:url(#g)}
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c58a22"/></marker>
    <marker id="g" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#82919d"/></marker>
  </defs>
  <rect width="1600" height="1000" fill="#ffffff"/><rect x="35" y="30" width="1530" height="930" rx="28" fill="#fbfcfd" stroke="#d4dde4" stroke-width="3"/>
  <text x="800" y="85" text-anchor="middle" class="title">项目1：Manim 桥梁工程教学动画生成端</text>
  <text x="800" y="122" text-anchor="middle" class="sub">从课程主题、教学规划到分镜渲染与项目导出</text>

  <rect class="box" x="85" y="195" width="245" height="125" rx="18"/><text x="208" y="232" text-anchor="middle" class="h">用户输入层</text>
  <text x="208" y="270" text-anchor="middle" class="t">桥梁主题 / 图片</text><text x="208" y="300" text-anchor="middle" class="small">时长、质量、分镜数量</text>
  <rect class="box" x="410" y="195" width="245" height="125" rx="18"/><text x="533" y="232" text-anchor="middle" class="h">问题定框</text>
  <text x="533" y="270" text-anchor="middle" class="t">problem_frame.json</text><text x="533" y="300" text-anchor="middle" class="small">固定主题、优先级与节奏</text>
  <rect class="core" x="735" y="195" width="245" height="125" rx="18"/><text x="858" y="232" text-anchor="middle" class="h">教学规划</text>
  <text x="858" y="270" text-anchor="middle" class="t">目标、大纲、视觉母题</text><text x="858" y="300" text-anchor="middle" class="small">内部提示词分阶段约束</text>
  <rect class="core" x="1060" y="195" width="245" height="125" rx="18"/><text x="1183" y="232" text-anchor="middle" class="h">分镜与视觉计划</text>
  <text x="1183" y="270" text-anchor="middle" class="t">旁白 / 对象 / 动作</text><text x="1183" y="300" text-anchor="middle" class="small">Storyboard JSON</text>
  <path class="arrow" d="M330 258 H405"/><path class="arrow" d="M655 258 H730"/><path class="arrow" d="M980 258 H1055"/>

  <rect class="core" x="1060" y="410" width="245" height="125" rx="18"/><text x="1183" y="447" text-anchor="middle" class="h">Manim 代码生成</text>
  <text x="1183" y="485" text-anchor="middle" class="t">整课 / 片段 Scene</text><text x="1183" y="515" text-anchor="middle" class="small">代码清洗与边界约束</text>
  <rect class="guard" x="735" y="410" width="245" height="125" rx="18"/><text x="858" y="447" text-anchor="middle" class="h">质量守卫</text>
  <text x="858" y="485" text-anchor="middle" class="t">py_compile + Visual Guard</text><text x="858" y="515" text-anchor="middle" class="small">语法、主题一致性、危险 API</text>
  <rect class="core" x="410" y="410" width="245" height="125" rx="18"/><text x="533" y="447" text-anchor="middle" class="h">Manim 片段渲染</text>
  <text x="533" y="485" text-anchor="middle" class="t">独立分镜视频</text><text x="533" y="515" text-anchor="middle" class="small">超时控制与错误日志</text>
  <rect class="guard" x="85" y="410" width="245" height="125" rx="18"/><text x="208" y="447" text-anchor="middle" class="h">最多 3 轮修复</text>
  <text x="208" y="485" text-anchor="middle" class="t">REPAIR_PROMPT</text><text x="208" y="515" text-anchor="middle" class="small">保留教学目标，仅修实现</text>
  <path class="arrow" d="M1183 320 V405"/><path class="arrow" d="M1060 472 H985"/><path class="arrow" d="M735 472 H660"/>
  <path class="dash" d="M410 472 H335"/><path class="dash" d="M208 405 V365 H858 V405"/>

  <rect class="data" x="170" y="665" width="300" height="130" rx="18"/><text x="320" y="704" text-anchor="middle" class="h">媒体处理</text>
  <text x="320" y="742" text-anchor="middle" class="t">字幕、旁白、音频缓存</text><text x="320" y="772" text-anchor="middle" class="small">FFmpeg 拼接与混流</text>
  <rect class="data" x="650" y="665" width="300" height="130" rx="18"/><text x="800" y="704" text-anchor="middle" class="h">项目资产</text>
  <text x="800" y="742" text-anchor="middle" class="t">分镜、源码、视频、日志</text><text x="800" y="772" text-anchor="middle" class="small">节点状态与流水线记录</text>
  <rect class="data" x="1130" y="665" width="300" height="130" rx="18"/><text x="1280" y="704" text-anchor="middle" class="h">课程设计成果</text>
  <text x="1280" y="742" text-anchor="middle" class="t">桥梁教学动画</text><text x="1280" y="772" text-anchor="middle" class="small">可预览、可导出、可进入审阅端</text>
  <path class="arrow" d="M533 535 V610 H320 V660"/><path class="arrow" d="M533 535 V600 H800 V660"/><path class="arrow" d="M470 730 H645"/><path class="arrow" d="M950 730 H1125"/>
  <text x="800" y="885" text-anchor="middle" class="sub">建筑意义：将桥梁构件关系、传力路径和施工过程转化为可检查的分镜动画</text>
</svg>
